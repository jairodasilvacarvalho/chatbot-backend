<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Dashboard — WhatsApp AI Agent</title>
  <style>
    body{font-family:Arial, sans-serif; margin:16px;}
    .row{display:flex; gap:16px;}
    .col{flex:1; border:1px solid #ddd; padding:12px; border-radius:10px;}
    input,button{padding:8px; margin:4px 0;}
    .list{max-height:70vh; overflow:auto;}
    .item{padding:8px; border:1px solid #eee; border-radius:8px; margin:6px 0; cursor:pointer;}
    .item:hover{background:#fafafa;}
    pre{white-space:pre-wrap; word-break:break-word; background:#f7f7f7; padding:10px; border-radius:8px;}
    .msg{padding:8px; border-radius:10px; margin:6px 0; max-width:90%;}
    .in{background:#f0f0ff;}
    .out{background:#f0fff0; margin-left:auto;}
    .muted{color:#777; font-size:12px;}
  </style>
</head>
<body>
  <h2>Admin Dashboard (MVP)</h2>

  <div class="row">
    <div class="col">
      <h3>Config</h3>
      <div>
        <div class="muted">Use a mesma admin key que você já usa nas rotas /admin</div>
        <input id="adminKey" placeholder="x-admin-key (ex: admin_dev_local_2026)" style="width:100%" />
        <input id="tenantId" placeholder="x-tenant-id (ex: 1)" value="1" style="width:100%" />
        <button id="btnLoad">Carregar clientes</button>
      </div>

      <h3>Clientes</h3>
      <div id="customers" class="list"></div>
    </div>

    <div class="col">
      <h3>Conversa</h3>
      <div class="muted" id="currentPhone">Nenhum selecionado</div>
      <div id="messages" class="list" style="max-height:45vh;"></div>

      <h3>Facts (read-only)</h3>
      <pre id="facts">{}</pre>
    </div>
  </div>

  <script src="/admin/app.js"></script>
</body>
</html>
